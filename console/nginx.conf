server {
  listen 80;
  server_name _;

  # Static files produced by `bun run build-only` in the Docker build stage.
  root /usr/share/nginx/html;
  index index.html;

  # Vite fingerprints built assets, so they can be cached aggressively.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Vue Router owns client-side routes. Serve index.html for unknown paths so
  # direct visits and refreshes such as /signin keep working.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
